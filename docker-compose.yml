version: "3.9"

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vitara
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vitara_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitara -d vitara_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://vitara:password@db:5432/vitara_db
      ALLOWED_ORIGINS: '["http://localhost"]'
      APP_ENV: development
      SECRET_KEY: local-dev-secret
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
